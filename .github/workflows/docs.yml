name: docs
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5   # enables Pages (build_type=workflow) on first run
        with:
          enablement: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r neuralgcm-torch/notebooks/requirements.txt
      - run: jupyter-book build neuralgcm-torch/notebooks
      - uses: actions/upload-pages-artifact@v3
        with:
          path: neuralgcm-torch/notebooks/_build/html
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
